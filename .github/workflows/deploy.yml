name: Deploy

on:
  release:
    types: [published]

env:
  IMAGE: pmananthu/pocket

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Extract version tag
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "tag=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Remove local images
        run: |
          docker rmi ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }} || true
          docker rmi ${{ env.IMAGE }}:latest || true
          docker image prune -f

  helm-upgrade:
    name: Helm Upgrade on Pi
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade
        run: |
          helm upgrade --install pocket ./helm/pocket \
            --namespace pocket \
            --create-namespace \
            --set image.tag=${{ needs.docker.outputs.tag }} \
            --set masterKey="${{ secrets.POCKET_MASTER_KEY }}" \
            --wait \
            --timeout 5m
