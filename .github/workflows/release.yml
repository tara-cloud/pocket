name: Release & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: pmananthu/pocket

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      already_exists: ${{ steps.tag_check.outputs.exists }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VER=$(cat VERSION | tr -d '[:space:]')
          echo "tag=v$VER" >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Read changelog entry
        id: changelog
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          BODY=$(awk '/^## \[/{if(p)exit; p=1} p' CHANGELOG.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tag and release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.already_exists != 'true'
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Extract version
        id: meta
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Remove local images
        run: |
          docker rmi ${{ env.IMAGE }}:${{ steps.meta.outputs.version }} || true
          docker rmi ${{ env.IMAGE }}:latest || true
          docker image prune -f

  helm-upgrade:
    name: Helm Upgrade on Pi
    runs-on: self-hosted
    needs: [release, docker]
    if: needs.release.outputs.already_exists != 'true'

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
          sudo chown $(id -u):$(id -g) ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Adopt namespace for Helm
        run: |
          kubectl create namespace pocket --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace pocket app.kubernetes.io/managed-by=Helm --overwrite
          kubectl annotate namespace pocket \
            meta.helm.sh/release-name=pocket \
            meta.helm.sh/release-namespace=pocket \
            --overwrite

      - name: Adopt pre-existing resources for Helm
        run: |
          for resource in pvc pv statefulset deployment service configmap secret; do
            kubectl get $resource -n pocket -o name 2>/dev/null | while read name; do
              kubectl label $name -n pocket app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true
              kubectl annotate $name -n pocket \
                meta.helm.sh/release-name=pocket \
                meta.helm.sh/release-namespace=pocket \
                --overwrite 2>/dev/null || true
            done
          done

      - name: Helm upgrade
        run: |
          helm upgrade --install pocket ./helm/pocket \
            --namespace pocket \
            --create-namespace \
            --set image.tag=${{ needs.docker.outputs.version }} \
            --set masterKey="${{ secrets.POCKET_MASTER_KEY }}" \
            --wait \
            --timeout 5m
