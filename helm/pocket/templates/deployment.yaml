---
# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: pocket
---
# ── Secret ────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: pocket-secrets
  namespace: pocket
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@pocket-postgres:5432/%s" .Values.postgres.user .Values.postgres.password .Values.postgres.database | quote }}
  POCKET_MASTER_KEY: {{ .Values.masterKey | quote }}
---
# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocket-postgres
  namespace: pocket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pocket-postgres
  template:
    metadata:
      labels:
        app: pocket-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pocket-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pocket-pgdata
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pocket-pgdata
  namespace: pocket
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.postgres.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: pocket-postgres
  namespace: pocket
spec:
  selector:
    app: pocket-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# ── Pocket App ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocket
  namespace: pocket
  labels:
    app: pocket
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pocket
  template:
    metadata:
      labels:
        app: pocket
        version: {{ .Values.image.tag | quote }}
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc pocket-postgres 5432 -w 1 </dev/null; do echo waiting; sleep 3; done']
      containers:
        - name: pocket
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              hostPort: {{ .Values.service.nodePort }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: STORAGE_PATH
              value: /data/artifacts
            - name: ELECTRO_URL
              value: {{ .Values.electroUrl | quote }}
            - name: POCKET_URL
              value: {{ .Values.pocketUrl | quote }}
            - name: POCKET_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: pocket-secrets
                  key: POCKET_MASTER_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pocket-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          livenessProbe:
            httpGet:
              path: /api/repos
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/repos
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: artifacts
              mountPath: /data/artifacts
      volumes:
        - name: artifacts
          hostPath:
            path: {{ .Values.app.dataPath }}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: pocket
  namespace: pocket
spec:
  selector:
    app: pocket
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
      nodePort: {{ .Values.service.nodePort }}
